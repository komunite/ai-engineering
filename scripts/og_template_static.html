<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,500;0,8..60,700;1,8..60,400&family=JetBrains+Mono:wght@400;500;700&family=VT323&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1280px; height: 640px; }
    body {
      background: #fafaf5;
      background-image:
        radial-gradient(circle at 3px 3px, rgba(53, 83, 255, 0.07) 1.1px, transparent 1.6px);
      background-size: 18px 18px;
      font-family: 'Source Serif 4', Georgia, serif;
      color: #1a1a1a;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 200px rgba(0,0,0,0.025);
    }
    .canvas {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 60px 80px 52px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border: 1.5px solid #1a1a1a;
    }
    .corner.tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
    .corner.tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
    .corner.bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
    .corner.br { bottom: 30px; right: 30px; border-left: none; border-top: none; }

    .top-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #7a7878;
    }
    .top-meta .right { color: #3553ff; font-weight: 500; }

    .top-divider {
      height: 1px;
      background: rgba(0,0,0,0.10);
      margin: 16px 0 32px;
    }

    /* Hero zone: split horizontally — title-block | specs panel */
    .hero {
      display: flex;
      align-items: flex-start;
      gap: 48px;
    }
    .hero-left  { flex: 0 0 720px; min-width: 0; }
    .hero-right { flex: 1; min-width: 0; }

    .eyebrow {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #3553ff;
      margin-bottom: 18px;
    }

    /* Hero title — matches homepage .manual-title: VT323 blueprint uppercase */
    .title {
      font-family: 'VT323', ui-monospace, 'JetBrains Mono', monospace;
      font-size: 108px;
      line-height: 0.92;
      letter-spacing: 0.02em;
      font-weight: 400;
      color: #3553ff;
      text-transform: uppercase;
      white-space: pre-line;
      margin-bottom: 22px;
      word-break: keep-all;
    }
    .title.long { font-size: 88px; }
    .title.very-long { font-size: 72px; line-height: 0.98; }

    .accent-line {
      width: 56px;
      height: 4px;
      background: #3553ff;
      margin-bottom: 20px;
    }

    .tagline {
      font-family: 'Source Serif 4', Georgia, serif;
      font-style: italic;
      font-size: 21px;
      line-height: 1.42;
      color: #4a4a48;
      max-height: 120px;
      overflow: hidden;
    }

    /* Right-side specs panel — reference-manual spec sheet */
    .specs {
      border: 1.5px solid rgba(26, 26, 26, 0.20);
      padding: 22px 26px 18px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      background: rgba(53, 83, 255, 0.025);
      position: relative;
    }
    .specs::before {
      content: "";
      position: absolute;
      top: -1px; left: -1px;
      width: 12px; height: 12px;
      border-top: 2.5px solid #3553ff;
      border-left: 2.5px solid #3553ff;
    }
    .specs::after {
      content: "";
      position: absolute;
      bottom: -1px; right: -1px;
      width: 12px; height: 12px;
      border-bottom: 2.5px solid #3553ff;
      border-right: 2.5px solid #3553ff;
    }
    .specs-header {
      font-size: 11px;
      letter-spacing: 0.20em;
      color: #3553ff;
      text-transform: uppercase;
      margin-bottom: 14px;
      font-weight: 500;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(53, 83, 255, 0.25);
    }
    .spec-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 9px 0;
      border-bottom: 1px dashed rgba(26, 26, 26, 0.10);
      font-size: 15px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }
    .spec-row:last-child { border-bottom: none; }
    .spec-row .lbl { color: #7a7878; }
    .spec-row .val { color: #1a1a1a; font-weight: 700; }
    .spec-row.accent .val { color: #3553ff; }

    /* Bottom strip */
    .bottom { display: flex; flex-direction: column; }
    .ascii-rule {
      height: 5px;
      background-image:
        repeating-linear-gradient(
          to right,
          #3553ff 0,
          #3553ff 2px,
          transparent 2px,
          transparent 7px
        );
      margin-bottom: 18px;
      opacity: 0.85;
    }
    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .langs { color: #1a1a1a; font-weight: 500; }
    .langs .lang-sep { color: #3553ff; margin: 0 8px; opacity: 0.6; }
    .brand {
      color: #1a1a1a;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .brand .mark {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 1.5px solid #3553ff;
      position: relative;
      vertical-align: middle;
    }
    .brand .mark::after {
      content: "AI";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 9px;
      font-weight: 700;
      color: #3553ff;
      letter-spacing: 0.04em;
    }
    .brand .domain {
      color: #7a7878;
      text-transform: lowercase;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>

  <div class="canvas">
    <div>
      <div class="top-meta">
        <span>{{META_LEFT}}</span>
        <span class="right">{{META_RIGHT}}</span>
      </div>
      <div class="top-divider"></div>

      <div class="hero">
        <div class="hero-left">
          <div class="eyebrow">{{EYEBROW}}</div>
          <h1 class="title {{TITLE_CLASS}}">{{TITLE}}</h1>
          <div class="accent-line"></div>
          <p class="tagline">{{TAGLINE}}</p>
        </div>

        <aside class="hero-right">
          <div class="specs">
            <div class="specs-header">FIG_000.A · KÜNYE</div>
            <div class="spec-row"><span class="lbl">Faz</span><span class="val">20</span></div>
            <div class="spec-row"><span class="lbl">Ders</span><span class="val">435</span></div>
            <div class="spec-row"><span class="lbl">Artifact</span><span class="val">489</span></div>
            <div class="spec-row"><span class="lbl">Saat</span><span class="val">~320</span></div>
            <div class="spec-row"><span class="lbl">Dil</span><span class="val">4</span></div>
            <div class="spec-row accent"><span class="lbl">Lisans</span><span class="val">MIT</span></div>
          </div>
        </aside>
      </div>
    </div>

    <div class="bottom">
      <div class="ascii-rule"></div>
      <div class="bottom-row">
        <div class="langs">{{FOOTER_LEFT}}</div>
        <div class="brand">
          <span class="mark"></span>
          <span class="domain">ai-muhendisligi.komunite.com.tr</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
